  - task_id: industry-agent-stack
    topic: Enterprise agent stack industry smoke
    source_profile: industry_broad
    research_profile: eval_smoke
    required_questions:
      - Which layers differentiate orchestration from retrieval?
      - Where do current vendors compete on guarantees?
      - What uncertainty should remain explicit?
    answered_questions:
      - Which layers differentiate orchestration from retrieval?
      - Where do current vendors compete on guarantees?
      - What uncertainty should remain explicit?
    report_markdown: |
      # Enterprise Agent Stack Landscape

      Workflow orchestration and retrieval quality solve different layers of the enterprise research stack, so comparisons should keep both concerns visible rather than collapsing them into one vendor score.[1][2][3]

      Public docs and papers show that teams differentiate on durable orchestration guarantees, retrieval depth, and how explicitly they surface uncertainty during synthesis.[1][2][3]
    task_summaries:
      - Orchestration durability and retrieval depth are separate comparison axes.[1][2][3]
