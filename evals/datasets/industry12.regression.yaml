    report_markdown: |
      # Retrieval Stack Structure

      Public papers and framework materials treat retrieval as a distinct layer from downstream generation, making retrieval quality a separate evaluation target.[1][2]

      The visible stack includes query planning, document selection, and grounding rather than a single monolithic model score.[1][2]
    task_summaries:
      - Retrieval remains a distinct layer from downstream generation in public technical materials.[1][2]
