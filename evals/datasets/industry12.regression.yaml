      - Why does evaluation stay separate from report formatting?
    report_markdown: |
      # Grounding and Evaluation Layer

      Public evaluation guidance and framework materials emphasize grounded claims, evidence linkage, and reproducibility instead of report-shape-only scoring.[1][2]

      Those materials also leave a live boundary question: grounded evidence quality is stable, but the exact balance between human review, automated judges, and report formatting checks is still presented with some uncertainty.[1][2]
