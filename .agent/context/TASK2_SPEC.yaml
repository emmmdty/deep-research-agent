project_positioning:
  one_liner: "企业级 Deep Research Agent：面向公司/行业深度研究的异步研究作业系统，强调工程化、可落地性、证据优先与可审计。"
  external_story:
    - "不是聊天机器人壳子"
    - "不是多智能体数量竞赛"
    - "是可恢复 runtime + source governance + claim audit + report bundle + eval gates 的研究系统"
  resume_value:
    - "可展示系统设计能力"
    - "可展示 AI 应用工程化能力"
    - "可展示评测与可靠性能力"

target_public_surface:
  cli:
    role: "开发/调试/复现/本地 smoke eval"
    commands:
      - "research submit"
      - "research status"
      - "research watch"
      - "research cancel"
      - "research retry"
      - "research resume"
      - "research refine"
      - "research bundle"
      - "eval run"
  api:
    role: "正式对外 contract"
    endpoints:
      - "POST /v1/research/jobs"
      - "GET /v1/research/jobs/{job_id}"
      - "GET /v1/research/jobs/{job_id}/events"
      - "POST /v1/research/jobs/{job_id}:cancel"
      - "POST /v1/research/jobs/{job_id}:retry"
      - "POST /v1/research/jobs/{job_id}:resume"
      - "POST /v1/research/jobs/{job_id}:refine"
      - "POST /v1/research/jobs/{job_id}:review"
      - "GET /v1/research/jobs/{job_id}/bundle"
      - "GET /v1/research/jobs/{job_id}/artifacts/{artifact_name}"
      - "POST /v1/batch/research"
  artifacts:
    role: "审计与面试展示"
    outputs:
      - "report.md"
      - "report.html"
      - "report_bundle.json"
      - "claims.json"
      - "sources.json"
      - "audit_decision.json"
      - "trace.jsonl"
      - "manifest.json"
      - "review_queue.json"
  batch:
    role: "批量研究与批量评测"
    entrypoint: "python -m deep_research_agent.gateway.cli batch run"

target_users:
  - "需要做公司研究的 AI 应用研发工程师 / 分析师"
  - "需要做行业研究的产品/战略/技术团队"
  - "面试官、招聘经理、技术评审"

non_goals:
  - "通用聊天产品"
  - "事件抽取平台"
  - "高权限 write-back agent"
  - "多租户 SaaS 首发版"
  - "只靠 provider-native deep research 的套壳"
  - "以报告长度或 citation 数量作为质量证明"

architecture_principles:
  - "deterministic lifecycle owns control plane"
  - "evidence objects precede prose"
  - "status and audit gate are separate contracts"
  - "every evidence must resolve to snapshot_ref"
  - "source policy is mandatory, not advisory"
  - "provider-native tools are optional accelerators, not system truth"
  - "evals and release gates define readiness"
  - "local dev profile and server profile must both be first-class"
  - "legacy multi-agent graph is archive-only"

target_topology:
  local_dev:
    runtime: "SQLite + filesystem + local subprocess worker"
    queue: "in-process or subprocess only"
    api: "optional local FastAPI"
    retrieval: "small smoke mode; reranker optional off"
    use_cases:
      - "单元测试"
      - "轻量集成测试"
      - "小规模 smoke eval"
  server_eval:
    runtime: "PostgreSQL + Redis Streams + object storage + API workers"
    queue: "Redis Streams consumer groups"
    object_store: "MinIO or S3-compatible"
    retrieval: "BGE-M3 + BGE-reranker-v2-m3"
    use_cases:
      - "长任务"
      - "批处理"
      - "评测"
      - "报告导出"
  optional_upper_bound:
    runtime_backend: "Temporal backend profile"
    connector_expansion: "MCP bridge"
    note: "非 P0"

keep_assets:
  - "specs/"
  - "docs/adr/"
  - "services/research_jobs/ 的状态机思想与 checkpoint/event 设计"
  - "connectors/models.py"
  - "connectors/snapshot_store.py"
  - "connectors/utils.py"
  - "policies/source_policy.py"
  - "policies/budget_guardrails.py"
  - "policies/source-profiles/"
  - "auditor/models.py"
  - "auditor/pipeline.py 的核心 claim/support/conflict 思想"
  - "artifacts/"
  - "tests/test_phase2_jobs.py"
  - "tests/test_phase3_connectors.py"
  - "tests/test_phase4_auditor.py"
  - "tools/web_search.py"
  - "tools/github_search.py"
  - "tools/arxiv_search.py"
  - "main.py 作为 thin wrapper"

migrate_assets:
  - "services/research_jobs/ -> src/deep_research_agent/research_jobs/"
  - "connectors/ -> src/deep_research_agent/connectors/"
  - "policies/ -> src/deep_research_agent/policy/"
  - "auditor/ -> src/deep_research_agent/auditor/"
  - "artifacts/ -> src/deep_research_agent/reporting/bundle/"
  - "llm/provider.py -> src/deep_research_agent/providers/"
  - "memory/evidence_store.py -> src/deep_research_agent/evidence_store/"
  - "evaluation/ + scripts/ -> evals/"
  - "research_policy.py -> src/deep_research_agent/policy/"
  - "README runtime narrative -> docs/architecture/ + README new positioning"

archive_assets:
  - "agents/"
  - "workflows/"
  - "legacy-run path"
  - "evaluation/comparators.py as migration diagnostics"
  - "evaluation/metrics.py old report-shape metrics"
  - "memory/store.py"
  - "mcp_servers/ placeholder content"
  - "old benchmark/comparator narratives"
  - "legacy outputs retained only for comparison and regression"

delete_assets:
  - "word-count based scoring"
  - "section-count based scoring"
  - "raw citation count based scoring"
  - "future core path dependence on comparator scripts"
  - "将多 agent 数量作为卖点的旧文案"

new_modules:
  - "src/deep_research_agent/gateway/"
  - "src/deep_research_agent/research_jobs/stages/"
  - "src/deep_research_agent/evidence_store/"
  - "src/deep_research_agent/reporting/"
  - "src/deep_research_agent/providers/"
  - "src/deep_research_agent/retrieval/"
  - "src/deep_research_agent/storage/"
  - "src/deep_research_agent/observability/"
  - "evals/datasets/"
  - "evals/rubrics/"
  - "evals/suites/"
  - "legacy/"

provider_strategy:
  supported_provider_types:
    - "openai"
    - "anthropic"
    - "openai_compatible"
    - "anthropic_compatible"
  routing_modes:
    manual:
      inputs:
        - "provider_profile"
        - "model_profile"
      use_cases:
        - "对照实验"
        - "成本控制"
        - "面试演示"
    auto:
      decision_inputs:
        - "task_role"
        - "required_capabilities"
        - "source_profile"
        - "budget"
        - "latency target"
        - "provider health"
        - "rate limit"
  task_role_routing:
    planning: "reasoning-capable premium model"
    query_rewrite: "cheap structured-output model"
    extraction: "cheap/medium structured-output model"
    audit_assist: "reasoning-capable model"
    synthesis: "medium/high quality model"
    judge: "prefer cross-vendor model"
    ocr_pdf_fallback: "provider-native file/PDF understanding only when needed"
    embeddings: "local model"
    rerank: "local model"
  lock_in_avoidance_rules:
    - "no business logic directly calls provider SDK"
    - "all LLM calls go through ProviderRouter"
    - "provider-native web/file search is optional, not mandatory"
    - "snapshot/policy/audit/bundle stay provider-neutral"

storage_strategy:
  local:
    db: "SQLite"
    object_store: "filesystem"
    vector_store: "optional local FAISS or none"
  server:
    db: "PostgreSQL"
    orm: "SQLAlchemy 2.x async"
    migrations: "Alembic"
    object_store: "MinIO or S3-compatible"
    vector_store: "pgvector optional; avoid standalone vector DB in P0"
  repositories:
    - "job_repository"
    - "checkpoint_repository"
    - "event_repository"
    - "document_repository"
    - "snapshot_repository"
    - "evidence_repository"
    - "claim_repository"
    - "audit_repository"
    - "artifact_repository"

runtime_strategy:
  control_plane: "deterministic state machine"
  stage_order:
    - "created"
    - "clarifying"
    - "planned"
    - "collecting"
    - "normalizing"
    - "extracting"
    - "claim_auditing"
    - "synthesizing"
    - "rendering"
    - "completed"
  side_states:
    - "failed"
    - "cancelled"
  quality_gate:
    values:
      - "unchecked"
      - "passed"
      - "blocked"
      - "pending_manual_review"
    rule: "job status and audit gate must be separate"
  events:
    requirements:
      - "append-only"
      - "monotonic checkpoint sequence"
      - "worker lease ownership"
      - "resume-safe"
  recovery:
    requirements:
      - "stale worker detection"
      - "resume from latest checkpoint"
      - "idempotent retry"
      - "cancel responsiveness <= 10s"
  refine_semantics:
    rule: "refine creates an explicit refinement event and resumes from safe stage boundary"

connector_strategy:
  first_class_connectors:
    - "web"
    - "github"
    - "arxiv"
    - "files"
    - "mcp_bridge"
  abstractions:
    - "search(request) -> CandidateSet"
    - "fetch(candidate) -> SourceDocument"
    - "ingest(file_ref) -> SourceDocument"
  mandatory_fields:
    - "connector_name"
    - "source_type"
    - "canonical_uri"
    - "auth_scope"
    - "freshness_metadata"
    - "policy_decision"
    - "snapshot_ref"
  policy_enforcement:
    - "allow/deny domains"
    - "trust tier restrictions"
    - "unsafe URI blocking"
    - "budget caps"
    - "connector ordering"
  source_profiles:
    - "company_trusted"
    - "company_broad"
    - "industry_trusted"
    - "industry_broad"
    - "public_then_private"
    - "trusted_only"
  retrieval_rules:
    - "official-source discovery first"
    - "primary evidence before secondary analysis"
    - "contradiction query family required"
    - "freshness query family required for time-sensitive tasks"

audit_strategy:
  core_objects:
    - "Claim"
    - "EvidenceFragment"
    - "ClaimSupportEdge"
    - "ConflictSet"
    - "AuditDecision"
    - "ReviewQueueItem"
  claim_types:
    - "fact"
    - "comparison"
    - "trend"
    - "causal_hypothesis"
    - "recommendation"
    - "unknown_or_gap"
  support_relations:
    - "supports"
    - "partially_supports"
    - "contradicts"
    - "context_only"
  gate_rules:
    - "critical claims need grounded support"
    - "blocked critical claims cannot appear as confident conclusions"
    - "contradictions and uncertainty must be surfaced in final bundle"
    - "manual overrides are append-only and visible"
  review_surface:
    - "CLI review command"
    - "API review endpoint"
    - "HTML viewer badges"

report_bundle_strategy:
  truth_object: "report_bundle.json"
  required_artifacts:
    - "report.md"
    - "report.html"
    - "report_bundle.json"
    - "claims.json"
    - "sources.json"
    - "audit_decision.json"
    - "trace.jsonl"
    - "manifest.json"
    - "review_queue.json"
  viewer_features:
    - "expand key findings to claims"
    - "expand claims to evidence fragments"
    - "show source metadata and snapshot refs"
    - "show conflict and uncertainty blocks"
    - "show audit badges and manual overrides"
  rendering_priority:
    - "HTML first-class"
    - "JSON bundle authoritative"
    - "PDF secondary export only"

evaluation_strategy:
  philosophy:
    - "claim-centric, not report-shape-centric"
    - "eval-driven development"
    - "frozen regression + live challenge dual track"
    - "automated grading where possible"
    - "human calibration on support/uncertainty/conflict"
  primary_metrics:
    - "critical_claim_support_precision"
    - "citation_error_rate"
    - "provenance_completeness"
    - "conflict_detection_recall"
    - "uncertainty_honesty_score"
    - "completion_rate"
    - "resume_success_rate"
    - "policy_compliance_rate"
    - "run_to_run_variance"
    - "ttff"
    - "ttfr"
    - "cost_per_completed_job"
  human_review_required_for:
    - "whether key claims are truly supported"
    - "coverage of must-answer questions"
    - "uncertainty honesty"
    - "recommendation overreach"
  llm_judge_scope:
    - "readability"
    - "structure"
    - "rubric hints"
    - "not sole release authority"

experiment_suites:
  - name: "smoke_local"
    purpose: "本地最小可运行性"
  - name: "unit_contracts"
    purpose: "schema/state/policy 单元级验证"
  - name: "integration_connectors"
    purpose: "connector/policy/snapshot 集成验证"
  - name: "e2e_api"
    purpose: "提交到交付全链路"
  - name: "company12"
    purpose: "公司研究主任务集"
  - name: "industry12"
    purpose: "行业研究主任务集"
  - name: "trusted8"
    purpose: "trusted-only 模式验证"
  - name: "file8"
    purpose: "文件接入与公私混合研究"
  - name: "cross_source8"
    purpose: "跨来源聚合与冲突处理"
  - name: "recovery6"
    purpose: "崩溃恢复与 stale recovery"
  - name: "cancel_retry6"
    purpose: "取消/重试 idempotency"
  - name: "refine4"
    purpose: "interrupt/refine controllability"
  - name: "adversarial8"
    purpose: "注入/镜像/伪新鲜/标题正文错配"
  - name: "grounding_judge12"
    purpose: "claim-support grounding 质量"
  - name: "report_quality12"
    purpose: "可读性与结构质量"
  - name: "latency_cost12"
    purpose: "延迟/成本边界"

release_gates:
  required_checks:
    - "runtime job recovery passes"
    - "connector fetch security passes"
    - "snapshot completeness threshold passes"
    - "claim audit grounding threshold passes"
    - "bundle schema validation passes"
    - "API contract tests pass"
    - "docs/public surface honesty passes"
    - "company12 passes thresholds"
    - "industry12 passes thresholds"
    - "adversarial8 passes thresholds"
    - "recovery6 passes thresholds"
    - "cost and latency stay within budget"
  hard_thresholds:
    critical_claim_support_precision: ">= 0.85"
    citation_error_rate: "< 0.05"
    provenance_completeness: ">= 0.95"
    completion_rate: ">= 0.90"
    system_controllability_score: ">= 80/100"
    adversarial_basic_pass_rate: ">= 0.80"
    run_to_run_variance: "< 0.10"
    ttff: "<= 120s"
    ttfr_p50: "<= 20m"
    ttfr_p95: "<= 30m"

milestone_plan:
  - milestone: "M0_truth_reset"
    goal: "统一 repo 叙事与真实主架构"
    done_when:
      - "contracts frozen"
      - "README/docs/specs consistent"
      - "legacy boundaries explicit"
  - milestone: "M1_runtime_core"
    goal: "deterministic runtime 成为唯一控制面"
    done_when:
      - "status/audit separated"
      - "resume/cancel/retry/refine semantics stable"
      - "local and server profiles defined"
  - milestone: "M2_connector_evidence_core"
    goal: "统一 connector + snapshot + evidence store"
    done_when:
      - "mandatory snapshot_ref"
      - "official connectors first-class"
      - "memory boundary removed"
  - milestone: "M3_audit_bundle"
    goal: "claim audit 与 report bundle 成型"
    done_when:
      - "review queue visible"
      - "HTML viewer works"
      - "bundle schema stable"
  - milestone: "M4_provider_api_retrieval"
    goal: "双 provider + API surface + local IR stack"
    done_when:
      - "OpenAI/Anthropic/compat all supported"
      - "FastAPI endpoints stable"
      - "BGE retrieval stack integrated"
  - milestone: "M5_evals_release_packaging"
    goal: "正式评测、release gates、demo 资产"
    done_when:
      - "company12/industry12/adversarial/recovery suites pass"
      - "CI gates wired"
      - "demo path reproducible"

directory_blueprint:
  - path: "src/deep_research_agent/gateway/"
    purpose: "API/CLI/batch/review public surface"
  - path: "src/deep_research_agent/research_jobs/"
    purpose: "job contracts, orchestration, stage executors, worker"
  - path: "src/deep_research_agent/connectors/"
    purpose: "search/fetch/ingest connectors and registry"
  - path: "src/deep_research_agent/policy/"
    purpose: "source profiles, trust taxonomy, budget and fetch validation"
  - path: "src/deep_research_agent/evidence_store/"
    purpose: "documents, snapshots, chunks, evidence, claims, conflicts"
  - path: "src/deep_research_agent/auditor/"
    purpose: "claim audit, gates, review queue, override log"
  - path: "src/deep_research_agent/reporting/"
    purpose: "bundle compiler, templates, viewer contract, exports"
  - path: "src/deep_research_agent/providers/"
    purpose: "provider adapters, routing, capability registry"
  - path: "src/deep_research_agent/retrieval/"
    purpose: "query planning, embeddings, rerank, dedupe"
  - path: "src/deep_research_agent/storage/"
    purpose: "database, object store, migrations"
  - path: "src/deep_research_agent/observability/"
    purpose: "structured logging, traces, metrics"
  - path: "evals/"
    purpose: "datasets, rubrics, suites, graders, release gates"
  - path: "tests/"
    purpose: "unit/integration/e2e/reliability/adversarial tests"
  - path: "legacy/"
    purpose: "archived graph agents, comparator diagnostics, old metrics"

coding_standards:
  - "全部核心代码使用类型注解"
  - "所有对外 contract 由 Pydantic v2 定义"
  - "禁止在业务逻辑里直接调用 provider SDK"
  - "禁止 connector 绕过 source policy 和 snapshot layer"
  - "禁止 synthesis 直接消费未经 snapshot 的外部文本"
  - "禁止把 status 与 audit gate 混为一谈"
  - "所有副作用写入必须有 idempotency 设计"
  - "所有关键路径必须输出 structured logs"
  - "所有新增模块必须附最小单测和集成测试"
  - "legacy 代码只能存在于 legacy/ 或 compatibility adapter"
  - "禁止新增按 report shape 打分的 release 指标"
  - "README 和 docs 必须与真实 public surface 保持一致"

definition_of_done:
  - "项目能以 API/CLI/batch 三种方式提交研究任务"
  - "同一研究任务在 local profile 和 server profile 下都可完成"
  - "所有 evidence 都能回溯到 snapshot_ref"
  - "所有 key findings 都能展开到 claims 与 evidence fragments"
  - "blocked critical claims 会显式进入 review queue"
  - "OpenAI / Anthropic / compatible base_url 可切换"
  - "company12 / industry12 / trusted8 / file8 / recovery6 / adversarial8 套件可运行"
  - "release gates 使用 claim-centric 指标并稳定通过"
  - "legacy multi-agent graph 不再是产品主叙事"
  - "项目可用一条稳定 demo 路径完成面试讲解"