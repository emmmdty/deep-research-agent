repo_baseline:
  current_native_eval_surface:
    - main.py eval run --suite
    - scripts/run_local_release_smoke.py
    - scripts/run_value_metrics.py
    - scripts/run_value_ablation_pack.py
    - scripts/build_value_scorecard.py
  current_native_suites:
    - company12
    - industry12
    - trusted8
    - file8
    - recovery6
  preserved_release_gate: true

benchmark_scope:
  in_scope:
    - facts_grounding
    - longfact_safe
    - longbench_v2
    - browsecomp
    - gaia
    - custom_domain_benchmark
  out_of_scope_initially:
    - browser_ui_frontend
    - multitenant_benchmark_service
    - automatic_private_leaderboard_submission_for_all_benchmarks

benchmark_roles:
  authoritative_release_gate:
    - custom_domain_benchmark
  secondary_regression:
    - facts_grounding
  external_regression:
    - longfact_safe
    - longbench_v2_short
  challenge_track:
    - browsecomp_guarded
    - gaia_supported_subset
    - longbench_v2_medium_long
  deferred:
    - facts_private_submission
    - gaia_private_submission
    - longbench_v2_official_submission

benchmark_priority:
  p0:
    - benchmark_scaffolding
    - facts_grounding_open
  p1:
    - longfact_safe
  p2:
    - longbench_v2
  p3:
    - browsecomp_guarded
    - gaia_supported_subset

benchmark_fit_matrix:
  custom_domain_benchmark:
    fit: high
    complexity: low
    role: authoritative_release_gate
    subset_first: false
  facts_grounding:
    fit: high
    complexity: medium
    role: secondary_regression
    subset_first: true
  longfact_safe:
    fit: medium_high
    complexity: medium_high
    role: external_regression
    subset_first: true
  longbench_v2:
    fit: medium
    complexity: medium
    role: external_regression_or_challenge
    subset_first: true
  browsecomp:
    fit: medium
    complexity: medium
    role: challenge_track
    subset_first: true
  gaia:
    fit: medium
    complexity: medium_high
    role: challenge_track
    subset_first: true

adapter_modes:
  custom_domain_benchmark: domain_report_bundle
  facts_grounding: facts_doc_grounded_longform
  longfact_safe: longfact_safe_open_domain_longform
  longbench_v2: longbench_mcq_longcontext
  browsecomp: browsecomp_short_answer
  gaia: gaia_capability_gated

subset_strategy:
  facts_grounding:
    smoke: 25
    regression: 200
    full_open: 860
  longfact_safe:
    smoke: 25
    regression: 200
    full: 2280
  longbench_v2:
    smoke_short: 20
    regression_short: 100
    smoke_medium: 20
    challenge_long: 20
  browsecomp:
    smoke_guarded: 20
    regression_guarded: 100
  gaia:
    smoke_supported: 20
    regression_supported: 50

integrity_guards:
  browsecomp:
    - benchmark_material_denylist
    - canary_string_detection
    - query_redaction
    - integrity_findings_manifest
  gaia:
    - capability_filter
    - gated_dataset_cache
    - attachment_path_sanitization
  facts_grounding:
    - public_private_split_separation
  longfact_safe:
    - search_trace_cache
    - judge_backend_logging
  longbench_v2:
    - bucket_assignment_logging
    - truncation_detection

resource_plan:
  local_cpu:
    use_for:
      - adapter_tests
      - smoke_subsets
      - manifest_generation
      - metric_aggregation
  server_4090:
    use_for:
      - nightly_subsets
      - medium_long_context_subset_runs
  api_models:
    use_for:
      - facts_grounding_if_needed
      - longfact_safe
      - browsecomp
      - longbench_when_context_supported
    must_not_be_single_point_of_value: true

directory_changes:
  add:
    - src/deep_research_agent/evals/external
    - src/deep_research_agent/evals/external/adapters
    - src/deep_research_agent/evals/external/benchmarks
    - src/deep_research_agent/evals/external/integrity
    - evals/external/configs
    - evals/external/dataset_manifests
    - evals/external/reports
    - docs/benchmarks
  keep:
    - src/deep_research_agent/evals
    - evals/suites
    - evals/reports/phase5_local_smoke
    - evals/reports/followup_metrics

scripts_to_add:
  - scripts/run_external_benchmark.py
  - scripts/run_benchmark_portfolio.py
  - scripts/build_benchmark_portfolio_summary.py
  - scripts/run_facts_grounding.py
  - scripts/run_longfact_safe.py
  - scripts/run_longbench_v2.py
  - scripts/run_browsecomp_guarded.py
  - scripts/run_gaia_subset.py

schemas_to_add:
  - schemas/benchmark_task_spec.schema.json
  - schemas/benchmark_run_manifest.schema.json
  - schemas/benchmark_task_result.schema.json
  - schemas/benchmark_portfolio_summary.schema.json
  - schemas/benchmark_integrity_report.schema.json

manifests_to_add:
  - benchmark_run_manifest.json
  - official_scores.json
  - internal_diagnostics.json
  - task_results.jsonl
  - integrity_report.json
  - portfolio_summary.json

metrics_mapping:
  facts_grounding:
    official:
      - eligibility_score
      - grounding_score
    internal:
      - critical_claim_support_precision
      - citation_error_rate
      - provenance_completeness
  longfact_safe:
    official:
      - precision
      - recall
      - f1_at_k
    internal:
      - latency_cost
      - supported_fact_ratio
  longbench_v2:
    official:
      - accuracy_overall
      - accuracy_by_bucket
      - accuracy_by_category
    internal:
      - truncation_rate
      - stage_runtime_seconds
  browsecomp:
    official:
      - short_answer_accuracy
      - semantic_equivalence_pass_rate
    internal:
      - search_steps
      - integrity_findings_count
  gaia:
    official:
      - success_rate
      - success_rate_by_level
      - success_rate_by_supported_capability
    internal:
      - attachment_handling_success_rate
      - tool_trace_completeness

experiments:
  merge_gate:
    - custom_domain_benchmark_current_pack
  rc_regression:
    - facts_grounding_open_smoke
    - benchmark_portfolio_summary
  nightly:
    - facts_grounding_open_subset
    - longfact_safe_subset
    - longbench_v2_short
  weekly_challenge:
    - browsecomp_guarded_subset
    - gaia_supported_subset
    - longbench_v2_medium

release_gate_strategy:
  merge_blocking:
    - custom_domain_benchmark
  rc_required_to_report:
    - facts_grounding_open_smoke
    - portfolio_summary_generation
  challenge_only:
    - browsecomp_guarded
    - gaia_supported_subset

deferred_items:
  - browsecomp_full_1266
  - gaia_full_multimodal
  - facts_private_submission
  - longbench_v2_full_submission
  - fully measured provider_routing_live_delta

risks:
  - browsecomp_contamination
  - gaia_capability_gap
  - facts_contract_mismatch
  - safe_search_drift
  - longbench_context_cost
  - provider_lock_in
  - benchmark_logic_pollutes_runtime

definition_of_done:
  - benchmark_scaffolding_exists
  - facts_grounding_open_subset_runs
  - longfact_safe_subset_runs
  - longbench_v2_short_runs
  - browsecomp_guarded_smoke_runs
  - gaia_supported_subset_runs
  - benchmark_portfolio_summary_exists
  - README_and_docs_benchmarks_updated
