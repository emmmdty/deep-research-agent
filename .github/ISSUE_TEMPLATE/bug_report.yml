name: Bug report
description: Report a reproducible problem in the project
title: "[Bug] "
labels: ["bug"]
body:
  - type: textarea
    attributes:
      label: What happened?
      description: Describe the bug and the expected behavior.
    validations:
      required: true
  - type: textarea
    attributes:
      label: Steps to reproduce
      description: Provide exact commands, inputs, or files when possible.
    validations:
      required: true
  - type: textarea
    attributes:
      label: Environment
      description: Python version, OS, and relevant provider/search configuration.
    validations:
      required: true
