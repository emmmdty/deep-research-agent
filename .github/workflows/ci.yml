name: CI

on:
  push:
    branches: ["main", "product-v1"]
  pull_request:

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: ".python-version"

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Sync dependencies
        run: uv sync

      - name: CLI help
        run: uv run python main.py --help

      - name: API import
        run: uv run python -c "from deep_research_agent.gateway.api import app; print(app.title)"

      - name: Install Web UI dependencies
        run: npm ci --prefix apps/gui-web

      - name: Build Web UI
        run: npm run build --prefix apps/gui-web
