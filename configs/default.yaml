"""默认运行时配置——YAML 格式。

configs/settings.py 会自动读取 .env 文件，
此文件提供可供参考的默认配置值和各选项的详细说明。
"""

# ============================================================
# LLM 配置
# ============================================================
llm:
  # 提供商：minimax / deepseek / openai / agicto / custom
  provider: minimax

  # 模型名称
  model_name: MiniMax-M2.5

  # 采样温度（0.0 = 确定性输出，1.0 = 最大随机性）
  temperature: 0.0

  # 最大输出 token 数
  max_tokens: 4096

# ============================================================
# 搜索配置
# ============================================================
search:
  # 后端：tavily / duckduckgo
  backend: tavily

  # 每次搜索返回的最大结果数
  max_results: 5

# ============================================================
# 研究流程配置
# ============================================================
research:
  # 最大迭代研究循环次数（Critic 不满足时回到 Researcher）
  max_loops: 3

# ============================================================
# 输出配置
# ============================================================
output:
  # 研究报告保存目录
  workspace_dir: workspace

# ============================================================
# 服务配置
# ============================================================
server:
  host: "0.0.0.0"
  port: 8000
  log_level: INFO
